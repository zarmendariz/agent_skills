name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --project .devtools

      - name: Run tests
        run: uv run --project .devtools pytest --cov --cov-report=term-missing

      - name: Validate all skills
        run: |
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/ast-grep
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/docling
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/nushell
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/skill-creator
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/skill-sync
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/tools
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/unit-testing
          uv run --project .devtools skills/skill-creator/scripts/quick_validate.py skills/uv
