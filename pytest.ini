[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = --tb=short -q --import-mode=importlib
pythonpath = .devtools .kilocode/skills/skill-sync/scripts .kilocode/skills/skill-creator/scripts .kilocode/skills/nushell/scripts
filterwarnings =
    error
